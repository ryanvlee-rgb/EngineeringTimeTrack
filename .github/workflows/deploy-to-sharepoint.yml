name: Deploy to SharePoint

on:
  push:
    branches: [main]
    paths:
      - 'time-entry.html'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Azure AD access token
        id: auth
        run: |
          TOKEN=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials" \
            | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to get access token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload time-entry.html to SharePoint SiteAssets
        run: |
          SITE_URL="https://graph.microsoft.com/v1.0/sites/${{ secrets.SHAREPOINT_SITE_ID }}"
          UPLOAD_URL="${SITE_URL}/drives/${{ secrets.SHAREPOINT_DRIVE_ID }}/root:/time-entry.html:/content"

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: text/html" \
            --data-binary @time-entry.html)

          echo "HTTP Status: $HTTP_STATUS"
          cat response.json | jq '.'

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Upload failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Deployed successfully to SharePoint SiteAssets"
